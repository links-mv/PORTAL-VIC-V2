<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal VIC</title>
    <link rel="icon" type="image/png" href="logo-pwa.png">
    <style>
        :root { --vli-azul: #0085B2; --vli-laranja: #F37021; }
        body { font-family: sans-serif; background: #005f83; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; background: var(--vli-azul); padding: 30px; border-radius: 20px; color: white; text-align: center; }
        .logo { width: 80px; background: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .step { display: none; }
        .step.active { display: block; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; }
        button { background: var(--vli-laranja); color: white; font-weight: bold; cursor: pointer; }
        #loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); color:white; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="loading">Carregando...</div>

<div class="container">
    <img src="logo-pwa.png" class="logo">
    
    <div id="step-start" class="step active">
        <h2>Portal VIC</h2>
        <button onclick="iniciarSistema()">Acessar Portal</button>
    </div>

    <div id="step-login" class="step">
        <h3>Login</h3>
        <input type="tel" id="input-mat" placeholder="Sua Matrícula">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="step-menu" class="step">
        <h3 id="saudacao"></h3>
        <button onclick="alert('Funcionalidade de EPI')">Solicitar EPI</button>
        <button onclick="alert('Funcionalidade de Desvio')">Relatar Desvio</button>
        <button onclick="fazerLogout()" style="background:none; border:1px solid white;">Sair</button>
    </div>
</div>

<script>
    const URL_API = 'https://script.google.com/macros/s/AKfycbytO_ANLIQSrhGDAJGQRUZD_-XjHHgp_yZZn8fyN-kvWj_SwT0QG_gcgqmdx9mqZx3OSw/exec';
    let db = { funcionarios: {} };

    // Função que verifica login logo ao carregar
    function iniciarSistema() {
        document.getElementById('loading').style.display = 'flex';
        fetch(URL_API)
            .then(res => res.json())
            .then(data => {
                db = data.dados;
                document.getElementById('loading').style.display = 'none';
                
                const matSalva = localStorage.getItem('vic_mat');
                if (matSalva && db.funcionarios[matSalva]) {
                    logar(matSalva, db.funcionarios[matSalva]);
                } else {
                    trocarTela('step-login');
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                alert("Erro ao conectar: " + err);
            });
    }

    function fazerLogin() {
        const mat = document.getElementById('input-mat').value;
        if (db.funcionarios[mat]) {
            localStorage.setItem('vic_mat', mat);
            logar(mat, db.funcionarios[mat]);
        } else {
            alert("Matrícula não encontrada.");
        }
    }

    function logar(mat, nomeCompleto) {
        const primeiroNome = nomeCompleto.split(' ')[0];
        document.getElementById('saudacao').innerText = "Olá, " + primeiroNome;
        trocarTela('step-menu');
    }

    function fazerLogout() {
        localStorage.removeItem('vic_mat');
        location.reload();
    }

    function trocarTela(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
