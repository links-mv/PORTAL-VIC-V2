<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal VIC</title>
    <style>
        :root { --vli-azul: #0085B2; --vli-laranja: #F37021; }
        
        /* CSS para garantir que o site se adapte ao girar a tela */
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 20px; 
            background: #005f83; 
            font-family: sans-serif; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .container { 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        
        .step { display: none; }
        .step.active { display: block; }
        
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--vli-laranja); color: white; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        input { width: 100%; padding: 18px; border-radius: 12px; border: none; font-size: 16px; margin-top: 10px; }
        
        /* Overlay de carregamento (O erro que você encontrou estava aqui) */
        #loading-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); color: white; justify-content: center; align-items: center; flex-direction: column; z-index: 999;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div id="loading-text">Carregando...</div>
</div>

<div class="container">
    <div id="step1" class="step active">
        <h2>Portal VIC</h2>
        <button onclick="carregarSistema()">ACESSAR PORTAL</button>
    </div>

    <div id="step2" class="step">
        <h3>Identificação</h3>
        <input type="number" id="matricula" placeholder="Digite sua matrícula">
        <button onclick="verificarLogin()">ENTRAR</button>
    </div>

    <div id="step3" class="step">
        <h2 id="msgBoasVindas"></h2>
        <button onclick="alert('Menu em construção')">SOLICITAR EPI</button>
        <button onclick="fazerLogout()" style="background:none; border:1px solid white;">SAIR</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbytO_ANLIQSrhGDAJGQRUZD_-XjHHgp_yZZn8fyN-kvWj_SwT0QG_gcgqmdx9mqZx3OSw/exec";
    let baseDados = {};

    function showLoad(texto) {
        const overlay = document.getElementById('loading-overlay');
        const text = document.getElementById('loading-text');
        if(text) text.innerText = texto;
        if(overlay) overlay.style.display = 'flex';
    }

    function hideLoad() {
        const overlay = document.getElementById('loading-overlay');
        if(overlay) overlay.style.display = 'none';
    }

    function carregarSistema() {
        showLoad("Sincronizando...");
        fetch(URL)
        .then(r => r.json())
        .then(data => {
            baseDados = data.dados.funcionarios;
            hideLoad();
            // Verifica se já tem login salvo
            const matSalva = localStorage.getItem('vic_mat');
            if (matSalva && baseDados[matSalva]) {
                logar(matSalva, baseDados[matSalva]);
            } else {
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
            }
        })
        .catch(err => {
            hideLoad();
            alert("Erro de conexão. Tente novamente.");
        });
    }

    function verificarLogin() {
        let mat = document.getElementById('matricula').value;
        if (baseDados[mat]) {
            localStorage.setItem('vic_mat', mat);
            logar(mat, baseDados[mat]);
        } else {
            alert("Matrícula não encontrada!");
        }
    }

    function logar(mat, nomeCompleto) {
        let primeiroNome = nomeCompleto.split(' ')[0];
        document.getElementById('msgBoasVindas').innerText = "Olá, " + primeiroNome;
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step3').classList.add('active');
    }

    function fazerLogout() {
        localStorage.removeItem('vic_mat');
        location.reload();
    }
</script>
</body>
</html>
